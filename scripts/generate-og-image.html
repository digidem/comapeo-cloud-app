<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=1200, initial-scale=1" />
    <title>CoMapeo Cloud OG Image</title>
    <style>
      :root {
        --primary: #1f6fff;
        --navy: #04145c;
        --background: #f4f6fa;
        --text: #172033;
        --shadow: 0 8px 24px rgba(9, 30, 66, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 1200px;
        height: 630px;
        margin: 0;
        overflow: hidden;
      }

      body {
        align-items: center;
        background:
          radial-gradient(
            circle at 88% 18%,
            rgba(31, 111, 255, 0.18),
            transparent 260px
          ),
          linear-gradient(
            135deg,
            #ffffff 0%,
            var(--background) 46%,
            #e9effb 100%
          );
        color: var(--text);
        display: flex;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
        justify-content: center;
      }

      .frame {
        display: grid;
        grid-template-columns: 300px minmax(0, 1fr);
        gap: 70px;
        height: 100%;
        padding: 88px 104px;
        position: relative;
        width: 100%;
      }

      .brand-mark {
        align-self: center;
        background: linear-gradient(145deg, #ffffff 0%, #edf3ff 100%);
        border-radius: 56px;
        box-shadow:
          var(--shadow),
          0 28px 70px rgba(4, 20, 92, 0.16);
        display: grid;
        height: 260px;
        justify-items: center;
        place-content: center;
        position: relative;
        width: 260px;
      }

      .brand-mark::before {
        background: var(--primary);
        border-radius: 999px;
        content: '';
        height: 118px;
        opacity: 0.12;
        position: absolute;
        right: 32px;
        top: 34px;
        width: 118px;
      }

      .brand-mark img {
        display: block;
        height: auto;
        position: relative;
        width: 188px;
        z-index: 1;
      }

      .content {
        align-self: center;
        min-width: 0;
        padding-top: 4px;
      }

      h1 {
        color: var(--navy);
        font-size: 112px;
        font-weight: 850;
        letter-spacing: 0;
        line-height: 0.92;
        margin: 0;
        max-width: 720px;
      }

      p {
        color: var(--text);
        font-size: 42px;
        font-weight: 600;
        letter-spacing: 0;
        line-height: 1.18;
        margin: 32px 0 0;
        max-width: 660px;
      }

      .accent {
        background: linear-gradient(180deg, var(--primary), var(--navy));
        border-radius: 999px;
        bottom: 88px;
        height: 132px;
        opacity: 0.92;
        position: absolute;
        right: 72px;
        width: 12px;
      }
    </style>
  </head>
  <body>
    <main class="frame" aria-label="CoMapeo Cloud social preview">
      <section class="brand-mark" aria-hidden="true">
        <img src="../public/favicon.svg" alt="" />
      </section>
      <section class="content">
        <h1>CoMapeo Cloud</h1>
        <p>Environmental monitoring dashboard</p>
      </section>
      <div class="accent" aria-hidden="true"></div>
    </main>
  </body>
</html>

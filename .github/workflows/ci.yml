name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same branch/PR to avoid wasting minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write
  pull-requests: write

env:
  # Opt into Node.js 24 for all JavaScript-based actions now, ahead of the
  # June 2 2026 forced migration.  Silences the Node.js 20 deprecation warning
  # for actions that haven't updated yet.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # -----------------------------------------------------------------------
  # TruffleHog secret scan (independent, needs full history)
  # -----------------------------------------------------------------------
  trufflehog:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: TruffleHog secret scan
        uses: trufflesecurity/trufflehog@v3.95.3
        with:
          base: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          head: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.event.after }}
          extra_args: --results=verified,unknown

  # -----------------------------------------------------------------------
  # Lint (parallel)
  # -----------------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: npm run lint

  # -----------------------------------------------------------------------
  # Type check (parallel)
  # -----------------------------------------------------------------------
  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: npm run lint:types

  # -----------------------------------------------------------------------
  # Unit tests with coverage + i18n check (parallel)
  # -----------------------------------------------------------------------
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Unit tests with coverage
        run: npm run test:coverage

      - name: i18n message extraction check
        run: npm run check:i18n

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7
          if-no-files-found: ignore

  # -----------------------------------------------------------------------
  # Storybook component tests (@storybook/addon-vitest, browser mode)
  # -----------------------------------------------------------------------
  storybook-tests:
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          # Keyed on bun.lock hash so a dependency bump automatically
          # invalidates the cache. Restore-keys falls back to the most
          # recent key for this OS+arch when the exact hash misses —
          # keeps cold-cache runs from being slowed by a full
          # `playwright install` on every PR.
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers (chromium-only for storybook tests)
        run: npx playwright install --with-deps chromium

      - name: Storybook component tests (browser mode)
        run: npm run test:storybook

      # Upload the test report and any browser test artifacts on failure so
      # failures are debuggable from the GitHub UI (no need to re-run locally
      # just to read the trace). The default vitest reporter is verbose;
      # --reporter=html emits a self-contained report directory.
      - name: Upload storybook test report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: storybook-tests-report
          path: |
            storybook-test-output
            **/test-results
            **/playwright-report
          if-no-files-found: ignore
          retention-days: 7

  # -----------------------------------------------------------------------
  # Storybook test-runner (a11y + play() functions) — see issue #77
  # Boots the static index.json produced by build-storybook, serves the
  # storybook-static/ bundle on localhost:6006, opens every story in a
  # real browser, and surfaces both axe-core violations and broken
  # `play()` interactions.
  # -----------------------------------------------------------------------
  storybook-test-runner:
    # Merge-order note: merge PR #94 first, then rebase this branch, so the
    # storybook-tests job name doesn't conflict. This job is fully self-contained
    # (no runtime dependency on #94's artifacts).
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers (chromium-only for test-runner)
        run: npx playwright install --with-deps chromium

      - name: Build Storybook static index
        run: npm run build-storybook
        env:
          VITE_STORYBOOK_A11Y_ENFORCE: 'false'

      - name: Serve Storybook static bundle (background)
        # The test-runner connects to a live HTTP server (default
        # localhost:6006). Without this server the runner fails immediately
        # with connection-refused. No explicit devDep — http-server@14.1.1 is
        # small (~2MB) and the npx download is sub-5s in practice. The version
        # is pinned in the npx call itself for reproducibility.
        #
        # The readiness loop MUST fail the step if the server never comes up
        # — otherwise the test-runner hits connection-refused and the failure
        # mode is opaque. `set -e` ensures the loop exit code propagates, and
        # the final `curl -fsS` (with -f) gates on a real 2xx response.
        run: |
          set -e
          nohup npx http-server@14.1.1 storybook-static -p 6006 --silent > /tmp/storybook-server.log 2>&1 &
          echo $! > /tmp/storybook-server.pid
          # Wait up to 30s for the server to actually start accepting connections
          ready=0
          for i in $(seq 1 30); do
            if curl -fsS -o /dev/null http://localhost:6006/index.html; then
              echo "Storybook server ready on port 6006 (after ${i}s)"
              ready=1
              break
            fi
            sleep 1
          done
          if [ "$ready" -ne 1 ]; then
            echo "::error::Storybook server failed to start within 30s. Last log lines:"
            tail -20 /tmp/storybook-server.log || true
            exit 1
          fi
          curl -fsS -I http://localhost:6006/index.html | head -3

      - name: Run Storybook test-runner (a11y + play() functions)
        run: npm run test:storybook:runner
        env:
          # Must match the build step's env var so both gates stay in sync.
          # The test-runner reads process.env.VITE_STORYBOOK_A11Y_ENFORCE at
          # runtime; preview.tsx reads import.meta.env at build time. Setting
          # the value on both steps is the explicit coupling point — a follow-up
          # PR flips both together (see issue #77).
          VITE_STORYBOOK_A11Y_ENFORCE: 'false'

      - name: Stop Storybook server
        if: always()
        run: |
          if [ -f /tmp/storybook-server.pid ]; then
            kill "$(cat /tmp/storybook-server.pid)" 2>/dev/null || true
          fi

  # -----------------------------------------------------------------------
  # Build + E2E (gated on all parallel checks)
  # -----------------------------------------------------------------------
  build-e2e:
    needs:
      [
        trufflehog,
        lint,
        typecheck,
        unit-tests,
        audit,
        storybook-tests,
        storybook-test-runner,
      ]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          # Keyed on bun.lock hash so a dependency bump automatically
          # invalidates the cache. Restore-keys falls back to the most
          # recent key for this OS+arch when the exact hash misses —
          # keeps cold-cache runs from being slowed by a full
          # `playwright install` on every PR.
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Build
        run: npm run build:ci
        env:
          VITE_PUBLIC_APP_ORIGIN: ${{ github.ref == 'refs/heads/main' && 'https://app.comapeo.cloud' || github.ref == 'refs/heads/staging' && 'https://staging.comapeo.cloud' || format('https://{0}', vars.PAGES_DOMAIN || 'comapeo-cloud-app.pages.dev') }}
          VITE_APP_RELEASE: ${{ github.sha }}
          VITE_APP_ENV: ${{ github.ref == 'refs/heads/main' && 'production' || github.ref == 'refs/heads/staging' && 'staging' || 'preview' }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 3

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: E2E tests (chromium-only on PRs, all browsers on main)
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            npx playwright test --project=chromium --reporter=list
          else
            npx playwright test --project=chromium --project=firefox --project=webkit --reporter=list
          fi

  # -----------------------------------------------------------------------
  # Visual regression with Argos CI
  # NOTE: Dependabot PRs don't have access to secrets (ARGOS_TOKEN is
  # empty), so Argos upload would fail. Skip visual regression for
  # dependabot — dep bumps don't need visual review anyway.
  # -----------------------------------------------------------------------
  visual-regression:
    needs: build-e2e
    if: needs.build-e2e.result == 'success' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          # Keyed on bun.lock hash so a dependency bump automatically
          # invalidates the cache. Restore-keys falls back to the most
          # recent key for this OS+arch when the exact hash misses —
          # keeps cold-cache runs from being slowed by a full
          # `playwright install` on every PR.
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run visual regression screenshots
        continue-on-error: true
        run: npm run test:screenshots:ci
        env:
          ARGOS_TOKEN: ${{ secrets.ARGOS_TOKEN }}
          VITE_PREVIEW: '1'

      - name: Upload screenshot artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: visual-regression-screenshots
          path: tests/e2e/screenshots/
          retention-days: 14
          if-no-files-found: ignore

  # -----------------------------------------------------------------------
  # Storybook visual regression baseline check
  # -----------------------------------------------------------------------
  visual-regression-check:
    needs: [trufflehog, lint, typecheck, unit-tests, audit]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Storybook visual regression check
        run: bun run storybook:screenshots:check

      - name: Upload screenshot diff artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-diff
          path: |
            tests/e2e/screenshots/desktop/storybook
            tests/e2e/screenshots/mobile/storybook
            tests/e2e/storybook-screenshots-baseline
            tests/e2e/storybook-screenshots-diff
          retention-days: 7
          if-no-files-found: ignore

  # -----------------------------------------------------------------------
  # Dependency vulnerability audit
  # -----------------------------------------------------------------------
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Security audit
        run: bun audit --audit-level=high --ignore GHSA-gv7w-rqvm-qjhr --ignore GHSA-hmw2-7cc7-3qxx --ignore GHSA-96hv-2xvq-fx4p

  # -----------------------------------------------------------------------
  # Preview deploy on pull_request
  # NOTE: Dependabot PRs don't have access to secrets (CLOUDFLARE_API_TOKEN
  # is empty), so the deploy would always fail. Skip preview for dependabot.
  # -----------------------------------------------------------------------
  preview:
    needs: build-e2e
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      preview-url: ${{ steps.deploy.outputs.pages-deployment-alias-url || steps.deploy.outputs.deployment-url }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Delete source maps from dist
        run: npx tsx scripts/clean-sourcemaps.ts

      - name: Assert no source maps remain
        run: npx tsx scripts/clean-sourcemaps.ts --assert-only

      - name: Copy Cloudflare Pages Functions into dist
        run: |
          if [ -d functions ]; then
            cp -r functions/ dist/functions/
          fi

      - name: Deploy preview to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: pages deploy dist/ --project-name=comapeo-cloud-app --branch=${{ github.head_ref }}

      - name: Comment preview URL on PR
        uses: actions/github-script@v9
        env:
          PREVIEW_ALIAS_URL: ${{ steps.deploy.outputs.pages-deployment-alias-url }}
          PREVIEW_DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
        with:
          script: |
            const url = process.env.PREVIEW_ALIAS_URL || process.env.PREVIEW_DEPLOYMENT_URL;
            if (!url) {
              console.log('No preview URL found, skipping comment.');
              return;
            }
            const body = `**Preview deployment ready:** ${url}\n\nCommit: \`${context.sha.slice(0, 7)}\``;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.startsWith('**Preview deployment ready:**'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  # -----------------------------------------------------------------------
  # Smoke tests against preview deployment
  # -----------------------------------------------------------------------
  smoke-test-preview:
    needs: preview
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Smoke test — app reachability
        run: |
          curl --fail --retry 5 --retry-delay 10 "${{ needs.preview.outputs.preview-url }}/"

      - name: Smoke test — SPA route fallback
        run: |
          curl --fail --retry 5 --retry-delay 10 "${{ needs.preview.outputs.preview-url }}/settings"

      - name: Smoke test — API proxy rejects missing target
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ needs.preview.outputs.preview-url }}/api/info")
          if [ "$STATUS" != "400" ]; then
            echo "Expected 400 for /api/info without x-target-url, got $STATUS"
            exit 1
          fi

      - name: Smoke test — API proxy succeeds with target
        if: vars.SMOKE_TEST_ARCHIVE_ORIGIN != ''
        run: |
          curl --fail --retry 5 --retry-delay 10 \
            -H "x-target-url: ${{ vars.SMOKE_TEST_ARCHIVE_ORIGIN }}" \
            "${{ needs.preview.outputs.preview-url }}/api/info"

      # Source-map absence is enforced pre-deploy by
      # `npx tsx scripts/clean-sourcemaps.ts --assert-only`; a runtime URL
      # probe cannot guess Vite's content-hashed chunk names reliably and
      # would be a false-assurance check.

  # -----------------------------------------------------------------------
  # Lightweight E2E against deployed preview (chromium-only, smoke-level)
  # -----------------------------------------------------------------------
  e2e-preview:
    needs: preview
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke-level E2E against preview
        continue-on-error: true
        run: npx playwright test --project=chromium --reporter=list
        env:
          BASE_URL: ${{ needs.preview.outputs.preview-url }}

  # -----------------------------------------------------------------------
  # Production deploy on main push
  # -----------------------------------------------------------------------
  deploy:
    needs: build-e2e
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      # Job-level so step-level `if:` can evaluate `env.SENTRY_AUTH_TOKEN`.
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
    outputs:
      deployment-url: ${{ steps.deploy.outputs.deployment-url }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Upload source maps to Sentry
        if: vars.VITE_SENTRY_DSN != '' && env.SENTRY_AUTH_TOKEN != ''
        run: npx tsx scripts/upload-sourcemaps.ts --production
        env:
          VITE_SENTRY_DSN: ${{ vars.VITE_SENTRY_DSN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          VITE_APP_RELEASE: ${{ github.sha }}

      - name: Delete source maps from dist
        run: npx tsx scripts/clean-sourcemaps.ts

      - name: Assert no source maps remain
        run: npx tsx scripts/clean-sourcemaps.ts --assert-only

      - name: Copy Cloudflare Pages Functions into dist
        run: |
          if [ -d functions ]; then
            cp -r functions/ dist/functions/
          fi

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: pages deploy dist/ --project-name=comapeo-cloud-app

  # -----------------------------------------------------------------------
  # Staging deploy on staging branch push
  # -----------------------------------------------------------------------
  staging:
    needs: build-e2e
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      # Job-level so step-level `if:` can evaluate `env.SENTRY_AUTH_TOKEN`.
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
    outputs:
      deployment-url: ${{ steps.deploy.outputs.deployment-url }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Upload source maps to Sentry (staging)
        if: vars.VITE_SENTRY_DSN != '' && env.SENTRY_AUTH_TOKEN != ''
        run: npx tsx scripts/upload-sourcemaps.ts
        env:
          VITE_SENTRY_DSN: ${{ vars.VITE_SENTRY_DSN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          VITE_APP_RELEASE: ${{ github.sha }}

      - name: Delete source maps from dist
        run: npx tsx scripts/clean-sourcemaps.ts

      - name: Assert no source maps remain
        run: npx tsx scripts/clean-sourcemaps.ts --assert-only

      - name: Copy Cloudflare Pages Functions into dist
        run: |
          if [ -d functions ]; then
            cp -r functions/ dist/functions/
          fi

      - name: Deploy staging to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: pages deploy dist/ --project-name=comapeo-cloud-app --branch=staging

  # -----------------------------------------------------------------------
  # Smoke tests against staging deployment
  # -----------------------------------------------------------------------
  smoke-test-staging:
    needs: staging
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Smoke test — app reachability
        run: |
          curl --fail --retry 10 --retry-delay 15 "${{ vars.STAGING_URL || needs.staging.outputs.deployment-url }}/"

      - name: Smoke test — SPA route fallback
        run: |
          curl --fail --retry 10 --retry-delay 15 "${{ vars.STAGING_URL || needs.staging.outputs.deployment-url }}/settings"

      - name: Smoke test — API proxy rejects missing target
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ vars.STAGING_URL || needs.staging.outputs.deployment-url }}/api/info")
          if [ "$STATUS" != "400" ]; then
            echo "Expected 400 for /api/info without x-target-url, got $STATUS"
            exit 1
          fi

      - name: Smoke test — API proxy succeeds with target
        if: vars.SMOKE_TEST_ARCHIVE_ORIGIN != ''
        run: |
          curl --fail --retry 10 --retry-delay 15 \
            -H "x-target-url: ${{ vars.SMOKE_TEST_ARCHIVE_ORIGIN }}" \
            "${{ vars.STAGING_URL || needs.staging.outputs.deployment-url }}/api/info"

  # -----------------------------------------------------------------------
  # Lighthouse against deployed Cloudflare URL
  # -----------------------------------------------------------------------
  lighthouse:
    needs: deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      # Lighthouse CI needs @lhci/cli which is in devDependencies
      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lighthouse CI against production
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: .lighthouserc.json
          uploadArtifacts: true

  # -----------------------------------------------------------------------
  # Lighthouse against staging
  # -----------------------------------------------------------------------
  lighthouse-staging:
    needs: staging
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lighthouse CI against staging
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            ${{ vars.STAGING_URL || needs.staging.outputs.deployment-url }}/
            ${{ vars.STAGING_URL || needs.staging.outputs.deployment-url }}/settings
            ${{ vars.STAGING_URL || needs.staging.outputs.deployment-url }}/data
          uploadArtifacts: true

  # -----------------------------------------------------------------------
  # Production smoke tests
  # -----------------------------------------------------------------------
  smoke-test-prod:
    needs: deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Smoke test — app reachability
        run: |
          curl --fail --retry 5 --retry-delay 10 "https://app.comapeo.cloud/"

      - name: Smoke test — SPA route fallback
        run: |
          curl --fail --retry 5 --retry-delay 10 "https://app.comapeo.cloud/settings"

      - name: Smoke test — API proxy rejects missing target
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://app.comapeo.cloud/api/info")
          if [ "$STATUS" != "400" ]; then
            echo "Expected 400 for /api/info without x-target-url, got $STATUS"
            exit 1
          fi

      - name: Smoke test — API proxy succeeds with target
        if: vars.SMOKE_TEST_ARCHIVE_ORIGIN != ''
        run: |
          curl --fail --retry 5 --retry-delay 10 \
            -H "x-target-url: ${{ vars.SMOKE_TEST_ARCHIVE_ORIGIN }}" \
            "https://app.comapeo.cloud/api/info"

      # Source-map absence is enforced pre-deploy via the assert step in the
      # `deploy` job. Runtime URL probes cannot reliably target Vite's
      # content-hashed chunk names.

name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same branch/PR to avoid wasting minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write
  pull-requests: write

env:
  # Opt into Node.js 24 for all JavaScript-based actions now, ahead of the
  # June 2 2026 forced migration.  Silences the Node.js 20 deprecation warning
  # for actions that haven't updated yet.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # -----------------------------------------------------------------------
  # TruffleHog secret scan (independent, needs full history)
  # -----------------------------------------------------------------------
  trufflehog:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: TruffleHog secret scan
        uses: trufflesecurity/trufflehog@v3.95.3
        with:
          base: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          head: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.event.after }}
          extra_args: --results=verified,unknown

  # -----------------------------------------------------------------------
  # Lint (parallel)
  # -----------------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  # -----------------------------------------------------------------------
  # Type check (parallel)
  # -----------------------------------------------------------------------
  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run lint:types

  # -----------------------------------------------------------------------
  # Unit tests with coverage + i18n check (parallel)
  # -----------------------------------------------------------------------
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Unit tests with coverage
        run: npm run test:coverage

      - name: i18n message extraction check
        run: npm run check:i18n

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7
          if-no-files-found: ignore

  # -----------------------------------------------------------------------
  # Build + E2E (gated on all parallel checks)
  # -----------------------------------------------------------------------
  build-e2e:
    needs: [trufflehog, lint, typecheck, unit-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build:ci
        env:
          VITE_PUBLIC_APP_ORIGIN: ${{ github.ref == 'refs/heads/main' && 'https://app.comapeo.cloud' || github.ref == 'refs/heads/staging' && 'https://staging.comapeo.cloud' || format('https://{0}', vars.PAGES_DOMAIN || 'pages.dev') }}
          VITE_APP_RELEASE: ${{ github.sha }}
          VITE_APP_ENV: ${{ github.ref == 'refs/heads/main' && 'production' || github.ref == 'refs/heads/staging' && 'staging' || 'preview' }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 3

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: E2E tests (chromium-only on PRs, all browsers on main)
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            npx playwright test --project=chromium --reporter=list
          else
            npx playwright test --project=chromium --project=firefox --project=webkit
          fi

  # -----------------------------------------------------------------------
  # Visual regression with Argos CI
  # -----------------------------------------------------------------------
  visual-regression:
    needs: build-e2e
    if: needs.build-e2e.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run visual regression screenshots
        run: npm run test:screenshots
        env:
          ARGOS_TOKEN: ${{ secrets.ARGOS_TOKEN }}

  # -----------------------------------------------------------------------
  # Dependency vulnerability audit
  # -----------------------------------------------------------------------
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        run: npm audit --audit-level=high

  # -----------------------------------------------------------------------
  # Preview deploy on pull_request
  # -----------------------------------------------------------------------
  preview:
    needs: build-e2e
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      preview-url: ${{ steps.deploy.outputs.pages-deployment-alias-url || steps.deploy.outputs.deployment-url }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Delete source maps from dist
        run: npx tsx scripts/clean-sourcemaps.ts

      - name: Assert no source maps remain
        run: npx tsx scripts/clean-sourcemaps.ts --assert-only

      - name: Copy Cloudflare Pages Functions into dist
        run: |
          if [ -d functions ]; then
            cp -r functions/ dist/functions/
          fi

      - name: Deploy preview to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: pages deploy dist/ --project-name=comapeo-cloud-app --branch=${{ github.head_ref }}

      - name: Comment preview URL on PR
        uses: actions/github-script@v9
        env:
          PREVIEW_ALIAS_URL: ${{ steps.deploy.outputs.pages-deployment-alias-url }}
          PREVIEW_DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
        with:
          script: |
            const url = process.env.PREVIEW_ALIAS_URL || process.env.PREVIEW_DEPLOYMENT_URL;
            if (!url) {
              console.log('No preview URL found, skipping comment.');
              return;
            }
            const body = `**Preview deployment ready:** ${url}\n\nCommit: \`${context.sha.slice(0, 7)}\``;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.startsWith('**Preview deployment ready:**'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  # -----------------------------------------------------------------------
  # Smoke tests against preview deployment
  # -----------------------------------------------------------------------
  smoke-test-preview:
    needs: preview
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Smoke test — app reachability
        run: |
          curl --fail --retry 5 --retry-delay 10 "${{ needs.preview.outputs.preview-url }}/"

      - name: Smoke test — SPA route fallback
        run: |
          curl --fail --retry 5 --retry-delay 10 "${{ needs.preview.outputs.preview-url }}/settings"

      - name: Smoke test — API proxy rejects missing target
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ needs.preview.outputs.preview-url }}/api/info")
          if [ "$STATUS" != "400" ]; then
            echo "Expected 400 for /api/info without x-target-url, got $STATUS"
            exit 1
          fi

      - name: Smoke test — API proxy succeeds with target
        if: vars.SMOKE_TEST_ARCHIVE_ORIGIN != ''
        run: |
          curl --fail --retry 5 --retry-delay 10 \
            -H "x-target-url: ${{ vars.SMOKE_TEST_ARCHIVE_ORIGIN }}" \
            "${{ needs.preview.outputs.preview-url }}/api/info"

      # Source-map absence is enforced pre-deploy by
      # `npx tsx scripts/clean-sourcemaps.ts --assert-only`; a runtime URL
      # probe cannot guess Vite's content-hashed chunk names reliably and
      # would be a false-assurance check.

  # -----------------------------------------------------------------------
  # Lightweight E2E against deployed preview (chromium-only, smoke-level)
  # -----------------------------------------------------------------------
  e2e-preview:
    needs: preview
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke-level E2E against preview
        run: npx playwright test --project=chromium --reporter=list
        env:
          BASE_URL: ${{ needs.preview.outputs.preview-url }}

  # -----------------------------------------------------------------------
  # Production deploy on main push
  # -----------------------------------------------------------------------
  deploy:
    needs: build-e2e
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      # Job-level so step-level `if:` can evaluate `env.SENTRY_AUTH_TOKEN`.
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
    outputs:
      deployment-url: ${{ steps.deploy.outputs.deployment-url }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Upload source maps to Sentry
        if: vars.VITE_SENTRY_DSN != '' && env.SENTRY_AUTH_TOKEN != ''
        run: npx tsx scripts/upload-sourcemaps.ts --production
        env:
          VITE_SENTRY_DSN: ${{ vars.VITE_SENTRY_DSN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          VITE_APP_RELEASE: ${{ github.sha }}

      - name: Delete source maps from dist
        run: npx tsx scripts/clean-sourcemaps.ts

      - name: Assert no source maps remain
        run: npx tsx scripts/clean-sourcemaps.ts --assert-only

      - name: Copy Cloudflare Pages Functions into dist
        run: |
          if [ -d functions ]; then
            cp -r functions/ dist/functions/
          fi

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: pages deploy dist/ --project-name=comapeo-cloud-app

  # -----------------------------------------------------------------------
  # Staging deploy on staging branch push
  # -----------------------------------------------------------------------
  staging:
    needs: build-e2e
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      # Job-level so step-level `if:` can evaluate `env.SENTRY_AUTH_TOKEN`.
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
    outputs:
      deployment-url: ${{ steps.deploy.outputs.deployment-url }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Upload source maps to Sentry (staging)
        if: vars.VITE_SENTRY_DSN != '' && env.SENTRY_AUTH_TOKEN != ''
        run: npx tsx scripts/upload-sourcemaps.ts
        env:
          VITE_SENTRY_DSN: ${{ vars.VITE_SENTRY_DSN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          VITE_APP_RELEASE: ${{ github.sha }}

      - name: Delete source maps from dist
        run: npx tsx scripts/clean-sourcemaps.ts

      - name: Assert no source maps remain
        run: npx tsx scripts/clean-sourcemaps.ts --assert-only

      - name: Copy Cloudflare Pages Functions into dist
        run: |
          if [ -d functions ]; then
            cp -r functions/ dist/functions/
          fi

      - name: Deploy staging to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: pages deploy dist/ --project-name=comapeo-cloud-app --branch=staging

  # -----------------------------------------------------------------------
  # Smoke tests against staging deployment
  # -----------------------------------------------------------------------
  smoke-test-staging:
    needs: staging
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Smoke test — app reachability
        run: |
          curl --fail --retry 10 --retry-delay 15 "${{ vars.STAGING_URL || needs.staging.outputs.deployment-url }}/"

      - name: Smoke test — SPA route fallback
        run: |
          curl --fail --retry 10 --retry-delay 15 "${{ vars.STAGING_URL || needs.staging.outputs.deployment-url }}/settings"

      - name: Smoke test — API proxy rejects missing target
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ vars.STAGING_URL || needs.staging.outputs.deployment-url }}/api/info")
          if [ "$STATUS" != "400" ]; then
            echo "Expected 400 for /api/info without x-target-url, got $STATUS"
            exit 1
          fi

      - name: Smoke test — API proxy succeeds with target
        if: vars.SMOKE_TEST_ARCHIVE_ORIGIN != ''
        run: |
          curl --fail --retry 10 --retry-delay 15 \
            -H "x-target-url: ${{ vars.SMOKE_TEST_ARCHIVE_ORIGIN }}" \
            "${{ vars.STAGING_URL || needs.staging.outputs.deployment-url }}/api/info"

  # -----------------------------------------------------------------------
  # Lighthouse against deployed Cloudflare URL
  # -----------------------------------------------------------------------
  lighthouse:
    needs: deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: 'npm'
          cache-dependency-path: package-lock.json

      # Lighthouse CI needs @lhci/cli which is in devDependencies
      - name: Install dependencies
        run: npm ci

      - name: Lighthouse CI against production
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: .lighthouserc.json
          uploadArtifacts: true

  # -----------------------------------------------------------------------
  # Production smoke tests
  # -----------------------------------------------------------------------
  smoke-test-prod:
    needs: deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Smoke test — app reachability
        run: |
          curl --fail --retry 5 --retry-delay 10 "https://app.comapeo.cloud/"

      - name: Smoke test — SPA route fallback
        run: |
          curl --fail --retry 5 --retry-delay 10 "https://app.comapeo.cloud/settings"

      - name: Smoke test — API proxy rejects missing target
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://app.comapeo.cloud/api/info")
          if [ "$STATUS" != "400" ]; then
            echo "Expected 400 for /api/info without x-target-url, got $STATUS"
            exit 1
          fi

      - name: Smoke test — API proxy succeeds with target
        if: vars.SMOKE_TEST_ARCHIVE_ORIGIN != ''
        run: |
          curl --fail --retry 5 --retry-delay 10 \
            -H "x-target-url: ${{ vars.SMOKE_TEST_ARCHIVE_ORIGIN }}" \
            "https://app.comapeo.cloud/api/info"

      # Source-map absence is enforced pre-deploy via the assert step in the
      # `deploy` job. Runtime URL probes cannot reliably target Vite's
      # content-hashed chunk names.
